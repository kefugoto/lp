<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — KEFUGOTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #F47E38;
  --dark: #1A1A1A;
  --gray: #888;
  --bg: #F5F5F5;
  --white: #fff;
  --border: #EEEEEE;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--dark);
  background: var(--bg);
  font-size: 15px;
  font-weight: 400;
}
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header a { font-size: 13px; color: var(--orange); text-decoration: none; }
header .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
.content {
  max-width: 680px;
  margin: 40px auto 80px;
  padding: 0 24px;
}
.card {
  background: var(--white);
  border-radius: 12px;
  padding: 40px;
  border: 1px solid var(--border);
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub { font-size: 14px; color: var(--gray); margin-bottom: 32px; line-height: 1.7; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.required {
  display: inline-block;
  font-size: 10px;
  background: var(--orange);
  color: white;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  color: var(--dark);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--orange); }
textarea { resize: vertical; min-height: 140px; line-height: 1.7; }
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--orange);
  color: white;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 28px;
  font-family: inherit;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.88; }
.note { font-size: 12px; color: var(--gray); margin-top: 16px; text-align: center; line-height: 1.7; }
footer {
  text-align: center;
  padding: 32px 24px;
  font-size: 12px;
  color: var(--gray);
}
footer a { color: var(--orange); text-decoration: none; }
@media (max-width: 480px) {
  .card { padding: 24px 20px; }
}
</style>
</head>
<body>

<header>
  <a href="https://kefugoto.github.io/lp/">← トップへ戻る</a>
  <span style="color:#ccc">|</span>
  <span class="logo">KEFUGOTO</span>
</header>

<div class="content">
  <div class="card">
    <h1>お問い合わせ</h1>
    <p class="sub">ご質問・ご意見・不具合報告などお気軽にどうぞ。<br>通常2〜3営業日以内にご返信します。</p>

    <form action="https://formsubmit.co/kefugoto@gmail.com" method="POST">
      <!-- FormSubmit設定 -->
      <input type="hidden" name="_subject" value="KEFUGOTOへのお問い合わせ">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://kefugoto.github.io/lp/thanks.html">

      <div class="field">
        <label>お問い合わせの種類 <span class="required">必須</span></label>
        <select name="category" required>
          <option value="" disabled selected>選択してください</option>
          <option value="bug">不具合・バグ報告</option>
          <option value="question">使い方の質問</option>
          <option value="payment">課金・購入について</option>
          <option value="privacy">プライバシーについて</option>
          <option value="delete">アカウント削除の申請</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="field">
        <label>メールアドレス <span class="required">必須</span></label>
        <input type="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="field">
        <label>お問い合わせ内容 <span class="required">必須</span></label>
        <textarea name="message" placeholder="詳しい内容をご記入ください" required></textarea>
      </div>

      <button type="submit" class="btn">送信する</button>
    </form>

    <p class="note">送信内容は<a href="https://kefugoto.github.io/lp/privacy.html">プライバシーポリシー</a>に従って取り扱います。</p>
  </div>
</div>

<footer>
  <a href="https://kefugoto.github.io/lp/">KEFUGOTO</a>
  &nbsp;|&nbsp;
  <a href="https://kefugoto.github.io/lp/privacy.html" style="color:var(--gray)">プライバシーポリシー</a>
  <br>
  © 2026 KEFUGOTO. All rights reserved.
</footer>

</body>
</html>
