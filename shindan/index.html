<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けふの決断疲れ度診断 — KEFUGOTO</title>
<meta name="description" content="10の質問に答えるだけ。あなたの決断疲れ度とタイプを診断します。">
<meta property="og:title" content="けふの決断疲れ度診断">
<meta property="og:description" content="10の質問に答えるだけ。あなたの決断疲れ度とタイプを診断します。">
<meta property="og:url" content="https://kefugoto.github.io/lp/shindan/">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #F47E38;
  --dark: #1A1A1A;
  --gray: #888888;
  --bg: #F5F5F5;
  --white: #fff;
  --border: #EEEEEE;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--dark);
  background: var(--white);
  min-height: 100svh;
  display: flex; flex-direction: column;
}
header {
  padding: 20px 24px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
header a { display: inline-block; }
header img { height: 28px; width: auto; vertical-align: middle; }
main {
  flex: 1;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 40px 24px 64px;
}
.label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 10px;
  text-align: center;
}
h1 {
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 700; line-height: 1.4;
  text-align: center;
  margin-bottom: 12px;
}
.desc {
  font-size: 14px; color: var(--gray); line-height: 1.85;
  text-align: center;
}
/* START SCREEN */
#start { text-align: center; animation: up 0.5s ease both; }
.start-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--orange); color: white;
  font-family: inherit;
  font-size: 15px; font-weight: 700;
  padding: 16px 44px; border-radius: 50px;
  border: none; cursor: pointer;
  margin-top: 36px;
  box-shadow: 0 6px 24px rgba(244,126,56,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(244,126,56,0.45); }
.start-note { font-size: 12px; color: var(--gray); margin-top: 14px; }
/* QUIZ SCREEN */
#quiz { display: none; }
.progress-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.progress-num {
  font-size: 13px; font-weight: 700; color: var(--orange);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.progress-track {
  flex: 1; height: 6px;
  background: var(--border); border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: var(--orange); border-radius: 3px;
  transition: width 0.3s ease;
}
.q-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 24px;
  text-align: center;
}
.q-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 14px;
}
.q-text {
  font-size: clamp(17px, 4.6vw, 21px);
  font-weight: 700; line-height: 1.7;
  min-height: 3.4em;
  display: flex; align-items: center; justify-content: center;
}
.answers {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 32px;
}
.ans-btn {
  font-family: inherit;
  font-size: 16px; font-weight: 700;
  padding: 18px 10px;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.ans-yes {
  background: var(--orange); color: white;
  border: 2px solid var(--orange);
  box-shadow: 0 6px 24px rgba(244,126,56,0.3);
}
.ans-no {
  background: var(--white); color: var(--dark);
  border: 2px solid var(--border);
}
.ans-btn:hover { transform: translateY(-2px); }
.ans-yes:hover { box-shadow: 0 10px 28px rgba(244,126,56,0.4); }
.ans-no:hover { border-color: var(--gray); }
.q-fade { animation: up 0.35s ease both; }
.quiz-note {
  font-size: 11px; color: var(--gray);
  text-align: center; margin-top: 20px; line-height: 1.8;
}
footer {
  border-top: 1px solid var(--border);
  text-align: center;
  padding: 24px;
  font-size: 11px; color: var(--gray); line-height: 2;
}
footer a { color: var(--gray); }
@keyframes up {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
  <a href="../"><img src="../assets/logo.png" alt="KEFUGOTO"></a>
</header>

<main>

  <!-- スタート画面 -->
  <div id="start">
    <div class="label">Quiz</div>
    <h1>けふの決断疲れ度診断</h1>
    <p class="desc">「今日なに着る？」「なに食べる？」<br>毎日の小さな決断、どれだけ溜まってる？<br>10問・約1分で、あなたの決断疲れタイプがわかります。</p>
    <button class="start-btn" id="startBtn">診断をはじめる</button>
    <div class="start-note">全10問・無料・登録不要</div>
  </div>

  <!-- 質問画面 -->
  <div id="quiz">
    <div class="progress-row">
      <div class="progress-num" id="progressNum">1/10</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-label" id="qLabel">Q1</div>
      <div class="q-text" id="qText"></div>
      <div class="answers">
        <button class="ans-btn ans-yes" id="btnYes">はい</button>
        <button class="ans-btn ans-no" id="btnNo">いいえ</button>
      </div>
    </div>
    <div class="quiz-note">直感で答えてOK。あとから戻れないのでお気をつけて。</div>
  </div>

</main>

<footer>
  <div>※この診断はエンタメコンテンツです。医学的診断ではありません。</div>
  <div>© 2026 KEFUGOTO. All rights reserved.</div>
</footer>

<script>
(function () {
  'use strict';

  var QUESTIONS = [
    '朝、服を決めるのに5分以上かかる日がある',
    'ランチは「いつもの」で済ませがち',
    '「何でもいいよ」と言いつつ提案されると不満',
    '寝る前にスマホで明日のことを考えてしまう',
    'ゴミの日を月1回以上忘れる',
    '出発時刻はいつもギリギリになる',
    '買い物で比較しすぎて結局買わないことがある',
    '「決めて」と人に頼むことがある',
    '夕方になると簡単なことも決められない',
    '朝に決めることが3つ以上ある'
  ];

  // 判定ロジック（優先順位つき）
  // answers: 長さ10のboolean配列（true = はい）
  function judge(answers) {
    function yes(n) { return !!answers[n - 1]; } // n は1始まりの質問番号
    function countYes(nums) {
      var c = 0;
      for (var i = 0; i < nums.length; i++) { if (yes(nums[i])) c++; }
      return c;
    }
    var total = 0;
    for (var i = 0; i < answers.length; i++) { if (answers[i]) total++; }

    var type;
    if (countYes([1, 4, 10]) >= 2)      { type = 'freeze'; }
    else if (yes(3) && yes(8))          { type = 'omakase'; }
    else if (yes(7))                    { type = 'perfect'; }
    else if (countYes([2, 5, 6]) >= 2)  { type = 'atomawashi'; }
    else if (total <= 3)                { type = 'jouzu'; }
    else                                { type = 'omakase'; }

    return { type: type, percent: total * 10 };
  }

  var answers = [];
  var current = 0;

  var startEl = document.getElementById('start');
  var quizEl = document.getElementById('quiz');
  var qCard = document.getElementById('qCard');
  var qLabel = document.getElementById('qLabel');
  var qText = document.getElementById('qText');
  var progressNum = document.getElementById('progressNum');
  var progressFill = document.getElementById('progressFill');

  function showQuestion() {
    qLabel.textContent = 'Q' + (current + 1);
    qText.textContent = QUESTIONS[current];
    progressNum.textContent = (current + 1) + '/10';
    progressFill.style.width = (current / QUESTIONS.length * 100) + '%';
    qCard.classList.remove('q-fade');
    void qCard.offsetWidth; // reflowでアニメーションをリセット
    qCard.classList.add('q-fade');
  }

  function answer(isYes) {
    answers.push(isYes);
    current++;
    if (current < QUESTIONS.length) {
      showQuestion();
    } else {
      finish();
    }
  }

  function finish() {
    progressFill.style.width = '100%';
    var result = judge(answers);
    location.href = 'r/' + result.type + '.html?p=' + result.percent;
  }

  document.getElementById('startBtn').addEventListener('click', function () {
    startEl.style.display = 'none';
    quizEl.style.display = 'block';
    showQuestion();
  });
  document.getElementById('btnYes').addEventListener('click', function () { answer(true); });
  document.getElementById('btnNo').addEventListener('click', function () { answer(false); });
})();
</script>

</body>
</html>
