<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>先送りの達人タイプ — けふの決断疲れ度診断 | KEFUGOTO</title>

<meta property="og:title" content="先送りの達人タイプ">
<meta property="og:description" content="『あとで決める』が口ぐせ">
<meta property="og:image" content="https://kefugoto.github.io/lp/shindan/og/atomawashi.png">
<meta property="og:url" content="https://kefugoto.github.io/lp/shindan/r/atomawashi.html">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #F47E38;
  --dark: #1A1A1A;
  --gray: #888888;
  --bg: #F5F5F5;
  --white: #fff;
  --border: #EEEEEE;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--dark);
  background: var(--white);
  min-height: 100svh;
  display: flex; flex-direction: column;
}
header {
  padding: 20px 24px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
header a { display: inline-block; }
header img { height: 28px; width: auto; vertical-align: middle; }
main {
  flex: 1;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 40px 24px 64px;
  animation: up 0.5s ease both;
}
.label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 12px;
  text-align: center;
}
.result-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 24px;
  text-align: center;
}
.result-emoji { font-size: 44px; line-height: 1; }
h1 {
  font-size: clamp(24px, 7vw, 32px);
  font-weight: 700; line-height: 1.4;
  margin-top: 14px;
  color: var(--orange);
}
.catch {
  font-size: clamp(14px, 4vw, 17px);
  font-weight: 500;
  margin-top: 8px;
}
.percent-block { margin-top: 28px; display: none; }
.percent-label { font-size: 12px; font-weight: 700; color: var(--gray); letter-spacing: 0.1em; }
.percent-value {
  font-size: clamp(48px, 16vw, 72px);
  font-weight: 700;
  color: var(--orange);
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.percent-value small { font-size: 0.4em; font-weight: 700; }
.percent-bar {
  height: 8px; border-radius: 4px;
  background: var(--bg);
  margin-top: 12px;
  overflow: hidden;
}
.percent-bar span {
  display: block; height: 100%; width: 0;
  background: var(--orange); border-radius: 4px;
  transition: width 0.8s ease;
}
.result-desc {
  font-size: 14px; color: var(--gray); line-height: 2;
  margin-top: 28px;
  text-align: left;
}
.actions { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 15px; font-weight: 700;
  padding: 16px 24px; border-radius: 50px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: translateY(-2px); }
.btn-share {
  background: var(--dark); color: white;
}
.btn-share:hover { box-shadow: 0 8px 24px rgba(26,26,26,0.25); }
.btn-app {
  background: var(--orange); color: white;
  box-shadow: 0 6px 24px rgba(244,126,56,0.35);
}
.btn-app:hover { box-shadow: 0 10px 32px rgba(244,126,56,0.45); }
.retry {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--gray);
}
.retry:hover { color: var(--dark); }
footer {
  border-top: 1px solid var(--border);
  text-align: center;
  padding: 24px;
  font-size: 11px; color: var(--gray); line-height: 2;
}
@keyframes up {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
  <a href="../../"><img src="../../assets/logo.png" alt="KEFUGOTO"></a>
</header>

<main>
  <div class="label">あなたの診断結果</div>
  <div class="result-card">
    <div class="result-emoji">🐢</div>
    <h1>先送りの達人タイプ</h1>
    <div class="catch">「『あとで決める』が口ぐせ」</div>

    <div class="percent-block" id="percentBlock">
      <div class="percent-label">決断疲れ度</div>
      <div class="percent-value"><span id="percentValue">0</span><small>%</small></div>
      <div class="percent-bar"><span id="percentBar"></span></div>
    </div>

    <p class="result-desc">小さな決断を「あとで」に回して、気づけば未決リストが山積みになりがち。<br>
締め切りや出発の直前になって、まとめてバタバタ片づけることも多いかも。<br>
そもそも決める回数を減らす仕組みを持つと、毎日が軽くなるかもしれません。</p>

    <div class="actions">
      <a class="btn btn-share" href="https://twitter.com/intent/tweet?text=%E7%A7%81%E3%81%AF%E3%80%8E%E5%85%88%E9%80%81%E3%82%8A%E3%81%AE%E9%81%94%E4%BA%BA%E3%82%BF%E3%82%A4%E3%83%97%E3%80%8F%E3%81%A7%E3%81%97%E3%81%9F%F0%9F%90%A2%20%23%E6%B1%BA%E6%96%AD%E7%96%B2%E3%82%8C%E8%A8%BA%E6%96%AD&url=https%3A%2F%2Fkefugoto.github.io%2Flp%2Fshindan%2Fr%2Fatomawashi.html" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        結果をXでシェア
      </a>
      <!-- リリース後にApp Store URL（?pt=&ct=shindan付き）へ差し替え -->
      <a class="btn btn-app" href="../../">KEFUGOTOを見る</a>
    </div>
  </div>

  <a class="retry" href="../index.html">もう一度診断する</a>
</main>

<footer>
  <div>※この診断はエンタメコンテンツです。医学的診断ではありません。</div>
  <div>© 2026 KEFUGOTO. All rights reserved.</div>
</footer>

<script>
(function () {
  'use strict';
  var p = parseInt(new URLSearchParams(location.search).get('p'), 10);
  if (!isNaN(p) && p >= 0 && p <= 100) {
    document.getElementById('percentBlock').style.display = 'block';
    document.getElementById('percentValue').textContent = p;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        document.getElementById('percentBar').style.width = p + '%';
      });
    });
  }
})();
</script>

</body>
</html>
